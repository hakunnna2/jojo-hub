<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff6321" />
    <meta name="description" content="JoJo Study Hub - A Pomodoro timer with exam tracking and picture-in-picture support" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Study Hub" />
    <meta name="msapplication-TileColor" content="#ff6321" />
    <meta name="msapplication-TileImage" content="/icon.svg" />
    <meta name="msapplication-config" content="none" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="shortcut icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="/icon.svg" color="#ff6321" />
    <title>JoJo Study Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch(err => {
            console.log('Service worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
