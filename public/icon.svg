<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="90"/>
  
  <!-- Tomato body -->
  <circle cx="256" cy="280" r="120" fill="#ff6321" opacity="0.95"/>
  
  <!-- Tomato ridges (segments) -->
  <ellipse cx="200" cy="280" rx="95" ry="115" fill="none" stroke="#ff6321" stroke-width="3" opacity="0.4"/>
  <ellipse cx="312" cy="280" rx="95" ry="115" fill="none" stroke="#ff6321" stroke-width="3" opacity="0.4"/>
  <line x1="256" y1="165" x2="256" y2="395" stroke="#ff6321" stroke-width="2" opacity="0.3"/>
  
  <!-- Stem/top -->
  <path d="M 240 160 Q 235 130 256 120 Q 277 130 272 160 Z" fill="#ff6321" opacity="0.85"/>
  
  <!-- Leaf -->
  <ellipse cx="300" cy="135" rx="35" ry="20" fill="#ff6321" opacity="0.7" transform="rotate(-35 300 135)"/>
  
  <!-- Shine/highlight on tomato -->
  <ellipse cx="220" cy="250" rx="35" ry="40" fill="#ffffff" opacity="0.15"/>
</svg>
